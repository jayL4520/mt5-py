# MT5 连接配置
mt5:
  # MT5 登录账号
  login: 12345678
  # MT5 登录密码
  password: "your-password"
  # MT5 服务器名称
  server: "Broker-Demo"
  # MT5 客户端路径，留空表示使用默认安装位置
  path: ""
  # 初始化连接超时时间，单位毫秒
  timeout: 60000
  # 是否使用 portable 模式启动 MT5
  portable: false

# 交易运行配置
trading:
  # 交易品种
  symbol: "XAUUSD"
  # 交易周期
  timeframe: "M1"
  # 每次拉取的历史 K 线数量
  history_bars: 1500
  # K 线时间修正小时数。若 MT5 K 线时间比本机真实时间快 3 小时则填 3；正常情况填 0
  mt5_bar_time_shift_hours: 0
  # 下单允许的最大滑点，单位 points
  slippage_points: 50
  # 策略魔术号，用于区分本系统订单
  magic_number: 260516
  # 订单备注
  comment: "xau-m1-momentum"
  # 轮询最新 K 线的间隔秒数
  poll_interval_seconds: 2
  # 最大同时持仓数
  max_open_positions: 1

# 策略参数配置
strategy:
  # 策略名称
  name: "xau_m1_momentum"
  # 单笔风险占净值比例
  risk_per_trade: 0.0025
  # 杠杆数，在风险模型算出的基础手数上再乘这个倍率，默认 1.1
  leverage_multiplier: 1.1
  # 快速 EMA 周期
  ema_fast: 21
  # 慢速 EMA 周期
  ema_slow: 55
  # RSI 周期
  rsi_period: 14
  # RSI 多头阈值
  rsi_buy_threshold: 58
  # RSI 空头阈值
  rsi_sell_threshold: 42
  # 突破回看 K 线数量
  breakout_lookback: 24
  # 成交量均值窗口。策略有 volume 字段时会用它过滤假突破
  volume_window: 20
  # 成交量确认倍数，1.05 表示当前量至少高于过去均量 5%
  volume_multiplier: 1.05
  # 突破缓冲比例，0.0002 表示价格至少额外突破约 0.02%，减少贴边假突破
  breakout_buffer_pct: 0.0002
  # 固定止盈比例，0.003 = +0.3%
  take_profit_pct: 0.003
  # 固定止损比例，0.004 = -0.4%
  stop_loss_pct: 0.004
  # 以下参数给通用均线 ATR 策略保留，当前 XAU 策略不会使用
  short_window: 20
  long_window: 50
  atr_period: 14
  atr_stop_multiple: 2.0
  reward_to_risk: 2.0

# 回测参数配置
backtest:
  # 回测初始资金
  initial_balance: 100000
  # 每手手续费
  commission_per_lot: 0.0
  # 模拟点差，单位 points
  spread_points: 50
  # 合约乘数，按券商实际品种调整
  contract_size: 1.0

# 安全与风控配置
safety:
  # 风控使用的本地时区
  timezone: "Asia/Shanghai"
  # 允许开新仓的交易时段，支持跨天
  trading_windows:
    - "00:00-24:00"
  # 当日最大亏损比例，到达后停止开新仓
  max_daily_loss_pct: 0.02
  # 连续亏损允许次数。只有实际连续亏损次数大于该值才停止开新仓；填 6 表示第 7 次及以后才熔断
  max_consecutive_losses: 6
  # 是否限制日内只做一个方向
  one_direction_per_day: true
  # 手工指定的新闻黑窗，格式为 开始时间/结束时间，使用本地时区
  news_blackout_windows:
    - "2026-05-18 20:25/2026-05-18 20:45"
  # 是否启用移动止损
  trailing_stop_enabled: true
  # 浮盈达到该比例后开始上移止损
  trailing_trigger_pct: 0.0015
  # 止损跟随当前价格的距离比例
  trailing_distance_pct: 0.0012

# 自动财经日历配置
news_calendar:
  # 是否启用自动财经日历
  enabled: true
  # 日历提供方，当前支持 disabled / mt5_file / tradingeconomics
  provider: "mt5_file"
  # 外部 API 凭证，仅在 provider=tradingeconomics 时使用
  api_key: "guest:guest"
  # 关注的国家列表，当前主要给外部 API 提供方使用
  countries:
    - "united states"
  # 新闻重要性，1=低，2=中，3=高
  importance: 3
  # 新闻发布时间前多少分钟开始禁开仓
  pre_blackout_minutes: 10
  # 新闻发布时间后多少分钟结束禁开仓
  post_blackout_minutes: 10
  # 向前拉取未来多少天的财经日历
  lookahead_days: 7
  # 本地缓存分钟数，避免频繁请求外部接口
  cache_minutes: 30
  # 单次请求超时秒数
  request_timeout_seconds: 20
  # 当 provider=mt5_file 时，默认从 MT5 Common\Files 下读取该文件名
  common_filename: "mt5_calendar_events.csv"
  # 如果想手工指定绝对路径，可填这里；留空则自动解析 Common\Files
  file_path: ""

# 回测报表输出配置
reporting:
  # 报表输出目录
  output_dir: "reports/xauusd_m1"
  # 是否导出 summary.json
  save_summary_json: true
  # 是否导出 trades.csv
  save_trades_csv: true
  # 是否导出 equity_curve.csv
  save_equity_csv: true
