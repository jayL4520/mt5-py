# MT5 连接配置
mt5:
  # MT5 登录账号
  login: 277679314
  # MT5 登录密码
  password: "!1qaz2wsxQ"
  # MT5 服务器名称
  server: "Exness-MT5Trial5"
  # MT5 客户端路径，留空表示使用默认安装位置
  path: ""
  # 初始化连接超时时间，单位毫秒
  timeout: 60000
  # 是否使用 portable 模式启动 MT5
  portable: false

# 交易运行配置
trading:
  # 交易品种，部分券商可能是 BTCUSDm / BTCUSD.
  symbol: "BTCUSDm"
  # BTC 策略默认使用 M15
  timeframe: "M15"
  # 每次拉取的历史 K 线数量
  history_bars: 2500
  # 下单允许的最大滑点，单位 points
  slippage_points: 300
  # 策略魔术号，用于区分本系统订单
  magic_number: 260519
  # 订单备注
  comment: "btc-m15-regime"
  # 轮询最新 K 线的间隔秒数
  poll_interval_seconds: 5
  # 最大同时持仓数
  max_open_positions: 1

# 策略参数配置
strategy:
  # 策略名称
  name: "btc_m15_regime"
  # 单笔风险占净值比例，BTC 波动大，建议先保守
  risk_per_trade: 0.004
  # 快速 EMA 周期
  ema_fast: 20
  # 慢速 EMA 周期
  ema_slow: 60
  # RSI 周期
  rsi_period: 14
  # RSI 多头阈值
  rsi_buy_threshold: 58
  # RSI 空头阈值
  rsi_sell_threshold: 42
  # 突破回看 K 线数量
  breakout_lookback: 20
  # ATR 周期
  atr_period: 14
  # ATR 止损倍数
  atr_stop_multiple: 2.4
  # 止盈止损收益比
  reward_to_risk: 2.6
  # ADX 周期
  adx_period: 14
  # ADX 最低趋势强度阈值
  adx_threshold: 24
  # 成交量均值窗口
  volume_window: 20
  # 成交量确认倍数
  volume_multiplier: 1.1
  # 突破缓冲比例，防止假突破
  breakout_buffer_pct: 0.001
  # 以下两个字段给固定百分比止盈止损策略保留，当前 BTC 策略主要用 ATR 动态止损
  take_profit_pct: 0.02
  stop_loss_pct: 0.01
  # 以下参数给通用均线 ATR 策略保留
  short_window: 20
  long_window: 50

# 回测参数配置
backtest:
  # 回测初始资金
  initial_balance: 100000
  # 每手手续费
  commission_per_lot: 0.0
  # 模拟点差，按券商 BTC 报价精度自行调整
  spread_points: 1000
  # 合约乘数，按券商实际品种调整
  contract_size: 1.0

# 安全与风控配置
safety:
  # 风控使用的本地时区
  timezone: "Asia/Shanghai"
  # BTC 24 小时交易，默认全天允许
  trading_windows:
    - "00:00-24:00"
  # 当日最大亏损比例
  max_daily_loss_pct: 0.03
  # 连续亏损阈值
  max_consecutive_losses: 3
  # BTC 允许日内双向切换，因此默认关闭
  one_direction_per_day: false
  # 手工新闻黑窗
  news_blackout_windows: []
  # 是否启用移动止损
  trailing_stop_enabled: true
  # 浮盈达到 1.2% 后启动移动止损
  trailing_trigger_pct: 0.012
  # 止损跟随当前价格 0.8%
  trailing_distance_pct: 0.008

# 自动财经日历配置
news_calendar:
  # 是否启用自动财经日历
  enabled: true
  # 日历提供方，推荐使用 MT5 自带经济日历
  provider: "mt5_file"
  # 外部 API 凭证，仅在 provider=tradingeconomics 时使用
  api_key: "guest:guest"
  # BTC 仍然会受美国宏观数据影响
  countries:
    - "united states"
  # 新闻重要性，1=低，2=中，3=高
  importance: 3
  # 新闻前禁开仓分钟数
  pre_blackout_minutes: 15
  # 新闻后禁开仓分钟数
  post_blackout_minutes: 20
  # 向前拉取未来多少天的财经日历
  lookahead_days: 7
  # 本地缓存分钟数
  cache_minutes: 30
  # 单次请求超时秒数
  request_timeout_seconds: 20
  # MT5 Common\Files 下的导出文件名
  common_filename: "mt5_calendar_events.csv"
  # 手工指定绝对路径，留空则自动解析
  file_path: ""

# 回测报表输出配置
reporting:
  # 报表输出目录
  output_dir: "reports/btcusd_m15"
  # 是否导出 summary.json
  save_summary_json: true
  # 是否导出 trades.csv
  save_trades_csv: true
  # 是否导出 equity_curve.csv
  save_equity_csv: true
